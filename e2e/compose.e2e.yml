services:
  traefik:
    image: traefik:v3.3
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=e2e_traefik
      - '--entrypoints.web.address=:80'
    ports:
      - '9080:80'
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
    networks:
      - traefik

  # Mock OIDC server — serves a fake GitHub Actions OIDC provider for E2E tests.
  # RollHook is configured to use this as its OIDC issuer via ROLLHOOK_OIDC_ISSUER.
  mock-oidc:
    image: oven/bun:1
    command: bun run /mock-oidc/server.ts
    ports:
      - '8080:8080'
    volumes:
      - type: bind
        source: ${PROJECT_ROOT}/e2e/mock-oidc
        target: /mock-oidc
    healthcheck:
      test: [CMD, bun, -e, "fetch('http://localhost:8080/.well-known/openid-configuration').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 1s
      timeout: 5s
      retries: 15
    networks:
      - traefik

  # RollHook runs as a container — mirrors real production deployment.
  # PROJECT_ROOT is set by global.ts to the monorepo root so that compose file paths
  # discovered from Docker labels (absolute host paths) are accessible inside this container.
  # The embedded Zot registry runs inside this container and is proxied at /v2/*.
  rollhook:
    image: rollhook-e2e-server:latest
    pull_policy: never
    # Run as root in E2E so the container can access the host Docker socket
    # regardless of the host docker group GID. Production deployments use
    # the non-root rollhook user defined in the Dockerfile.
    user: root
    ports:
      - '7700:7700'
    environment:
      ROLLHOOK_SECRET: ${ROLLHOOK_SECRET}
      ROLLHOOK_OIDC_ISSUER: http://mock-oidc:8080
      ROLLHOOK_URL: ${ROLLHOOK_URL:-http://localhost:7700}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: ${PROJECT_ROOT}
        target: ${PROJECT_ROOT}
    depends_on:
      traefik:
        condition: service_started
      mock-oidc:
        condition: service_healthy
    networks:
      - traefik

networks:
  traefik:
    name: e2e_traefik
