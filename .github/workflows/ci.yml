name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck

  go-checks:
    name: Go Build, Test & OpenAPI Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.24.1
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
      - name: Check OpenAPI spec is up to date
        run: |
          go run ./cmd/gendocs 2>/dev/null > /tmp/fresh_openapi.json
          if ! diff -u apps/dashboard/openapi.json /tmp/fresh_openapi.json; then
            echo ""
            echo "openapi.json is out of date. Regenerate:"
            echo "  docker run --rm -v \$(pwd):/workspace -w /workspace golang:1.24-alpine go run ./cmd/gendocs > apps/dashboard/openapi.json"
            exit 1
          fi

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [lint-typecheck, go-checks]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - name: Pre-pull Docker images (with retry)
        run: |
          pulled=0
          for i in 1 2 3; do
            if docker pull oven/bun:1.3.9-slim; then
              pulled=1
              break
            fi
            if [ "$i" -lt 3 ]; then
              echo "Pull attempt $i failed, retrying in 30s..."
              sleep 30
            fi
          done
          if [ "$pulled" -ne 1 ]; then
            echo "Failed to pull oven/bun:1.3.9-slim after 3 attempts"
            exit 1
          fi
      - name: Run E2E tests
        run: bun run test:e2e
        timeout-minutes: 12
      - name: Upload E2E job logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-job-logs
          path: data/logs/
          if-no-files-found: ignore
